version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    environment:
      CLIENT_ID: demo
    ports:
      - "8000:8000"

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    environment:
      STORE_API_URL: http://api:8000
      STORE_CLIENT_ID: demo
      NEXT_PUBLIC_STORE_API_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

